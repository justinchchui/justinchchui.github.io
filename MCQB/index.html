<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Revision Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: #1e293b;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .option-btn {
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: flex-start;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #334155;
            border-color: #64748b;
        }
        .correct {
            background-color: #059669 !important;
            border-color: #10b981 !important;
            color: white;
        }
        .wrong {
            background-color: #dc2626 !important;
            border-color: #ef4444 !important;
            color: white;
        }
        select {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 0.5rem;
            border-radius: 0.375rem;
            width: 100%;
            cursor: pointer;
        }
        select:focus {
            outline: 2px solid #3b82f6;
            border-color: transparent;
        }
        option {
            background-color: #1e293b;
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <nav class="p-4 bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
            <a href="../" class="flex items-center text-blue-400 hover:text-blue-300 font-medium transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>
            <h1 class="text-xl font-bold text-white hidden sm:block">Physics Quiz System</h1>
            <div id="quiz-progress" class="text-sm font-mono text-slate-400">Ready</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col items-center">
        
        <!-- Setup/Filter View -->
        <div id="setup-view" class="w-full max-w-2xl glass-card rounded-xl p-8">
            <h2 class="text-3xl font-bold mb-4 text-center">Quiz Configuration</h2>
            <p class="text-slate-400 mb-8 text-center">Select your study area to begin.</p>
            
            <div id="loading-indicator" class="text-center py-4">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-2"></div>
                <p class="text-xs text-slate-500">Loading database...</p>
            </div>

            <div id="filter-controls" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Subject</label>
                    <select id="select-subject"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Form / Level</label>
                    <select id="select-form"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Topic</label>
                    <select id="select-topic"></select>
                </div>
                
                <div class="pt-6">
                    <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold text-lg transition-all transform hover:scale-[1.02]">
                        Start Quiz
                    </button>
                    <p id="question-count-preview" class="text-center text-xs text-slate-500 mt-3"></p>
                </div>
            </div>
            
            <div id="error-message" class="hidden mt-4 p-4 bg-red-900/20 border border-red-500/50 rounded text-red-400 text-center text-sm">
                Failed to load question database. Please ensure 'QB/index.csv' exists.
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="w-full max-w-2xl hidden">
            <div id="question-card" class="glass-card rounded-xl p-6 mb-6">
                <div id="q-meta" class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2">Topic</div>
                <div id="q-text" class="text-xl font-medium mb-6 leading-relaxed"></div>
                <div id="q-statements" class="space-y-2 mb-6 hidden"></div>
                <div id="q-options" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div class="flex justify-between items-center h-12">
                <div id="feedback" class="font-bold text-lg"></div>
                <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-medium transition">Next</button>
            </div>
        </div>

        <!-- Result View -->
        <div id="result-view" class="w-full max-w-2xl glass-card rounded-xl p-8 text-center hidden">
            <h2 class="text-3xl font-bold mb-2">Results</h2>
            <div id="score-display" class="text-6xl font-extrabold text-blue-500 my-6">0 / 0</div>
            <p id="result-text" class="text-slate-400 mb-8"></p>
            <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-bold transition">Restart</button>
        </div>

    </main>

    <script>
        const CSV_FILE = 'QB/index.csv';
        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let canAnswer = true;

        // Elements
        const setupView = document.getElementById('setup-view');
        const quizView = document.getElementById('quiz-view');
        const resultView = document.getElementById('result-view');
        const filterControls = document.getElementById('filter-controls');
        const loadingIndicator = document.getElementById('loading-indicator');
        const errorMessage = document.getElementById('error-message');
        const startBtn = document.getElementById('start-btn');
        
        const selSubject = document.getElementById('select-subject');
        const selForm = document.getElementById('select-form');
        const selTopic = document.getElementById('select-topic');
        const countPreview = document.getElementById('question-count-preview');

        async function loadQuizData() {
            try {
                const response = await fetch(`${CSV_FILE}?v=${Date.now()}`);
                if (!response.ok) throw new Error("HTTP " + response.status);
                const text = await response.text();
                allQuestions = parseCSV(text);
                
                if (allQuestions.length > 0) {
                    populateFilters();
                    loadingIndicator.classList.add('hidden');
                    filterControls.classList.remove('hidden');
                } else {
                    throw new Error("No questions found");
                }
            } catch (e) {
                console.error("Database Load Error:", e);
                loadingIndicator.classList.add('hidden');
                errorMessage.classList.remove('hidden');
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
            const result = [];
            
            const parseLine = (line) => {
                const parts = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) {
                        parts.push(current.trim());
                        current = '';
                    } else { current += char; }
                }
                parts.push(current.trim());
                return parts;
            };

            for (let i = 1; i < lines.length; i++) {
                const d = parseLine(lines[i]);
                if (d.length < 15) continue;
                result.push({
                    subject: d[0],
                    form: d[1],
                    topic: d[2],
                    subtopic: d[3],
                    type: d[4],
                    question: d[6],
                    statements: [d[7], d[8], d[9]].filter(s => s && s.trim() !== ''),
                    options: [d[10], d[11], d[12], d[13]],
                    correct: d[14]
                });
            }
            return result;
        }

        function populateFilters() {
            const subjects = [...new Set(allQuestions.map(q => q.subject))].sort();
            const forms = [...new Set(allQuestions.map(q => q.form))].sort();
            const topics = [...new Set(allQuestions.map(q => q.topic))].sort();

            const createOptions = (el, items, label) => {
                el.innerHTML = `<option value="all">All ${label}s</option>` + 
                    items.map(item => `<option value="${item}">${item}</option>`).join('');
            };

            createOptions(selSubject, subjects, "Subject");
            createOptions(selForm, forms, "Form");
            createOptions(selTopic, topics, "Topic");

            [selSubject, selForm, selTopic].forEach(el => el.addEventListener('change', updateCount));
            updateCount();
        }

        function updateCount() {
            const s = selSubject.value;
            const f = selForm.value;
            const t = selTopic.value;

            filteredQuestions = allQuestions.filter(q => {
                const matchS = s === 'all' || q.subject === s;
                const matchF = f === 'all' || q.form === f;
                const matchT = t === 'all' || q.topic === t;
                return matchS && matchF && matchT;
            });

            // Randomize question order
            filteredQuestions.sort(() => Math.random() - 0.5);

            countPreview.textContent = `${filteredQuestions.length} questions matching criteria`;
            startBtn.disabled = filteredQuestions.length === 0;
        }

        function showQuestion() {
            canAnswer = true;
            document.getElementById('feedback').textContent = '';
            document.getElementById('next-btn').classList.add('hidden');
            const q = filteredQuestions[currentIndex];
            
            document.getElementById('q-meta').textContent = `${q.topic} • ${q.subtopic}`;
            document.getElementById('q-text').innerHTML = q.question;
            document.getElementById('quiz-progress').textContent = `Question ${currentIndex + 1} / ${filteredQuestions.length}`;

            const sCont = document.getElementById('q-statements');
            sCont.innerHTML = '';
            if (q.type == "2" && q.statements.length > 0) {
                sCont.classList.remove('hidden');
                q.statements.forEach((s, i) => {
                    const d = document.createElement('div');
                    d.className = 'text-sm bg-slate-800/50 p-3 rounded border border-slate-700';
                    d.innerHTML = `<span class="text-blue-400 font-bold">(${i+1})</span> ${s}`;
                    sCont.appendChild(d);
                });
            } else {
                sCont.classList.add('hidden');
            }

            const oCont = document.getElementById('q-options');
            oCont.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-4 rounded-lg border border-slate-700 bg-slate-800/30 font-medium w-full';
                btn.innerHTML = `<span class="text-slate-500 font-mono mr-3">${String.fromCharCode(65 + i)}.</span> <span>${opt}</span>`;
                btn.onclick = () => checkAnswer(i + 1, btn);
                oCont.appendChild(btn);
            });

            if (window.MathJax) {
                MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err.message));
            }
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = filteredQuestions[currentIndex];
            let cIdx = 1;
            if (q.correct.toLowerCase().includes('option')) {
                cIdx = parseInt(q.correct.replace(/[^0-9]/g, '')) || 1;
            } else {
                cIdx = parseInt(q.correct) || 1;
            }

            const buttons = document.getElementById('q-options').querySelectorAll('button');
            
            if (selected === cIdx) {
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = '<span class="text-emerald-400">✓ Correct</span>';
                score++;
            } else {
                btn.classList.add('wrong');
                if (buttons[cIdx - 1]) buttons[cIdx - 1].classList.add('correct');
                document.getElementById('feedback').innerHTML = '<span class="text-red-400">✗ Incorrect</span>';
            }

            buttons.forEach(b => b.disabled = true);
            const n = document.getElementById('next-btn');
            n.classList.remove('hidden');
            n.textContent = (currentIndex === filteredQuestions.length - 1) ? 'Finish' : 'Next Question';
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                quizView.classList.add('hidden');
                resultView.classList.remove('hidden');
                document.getElementById('score-display').textContent = `${score} / ${filteredQuestions.length}`;
                const percentage = (score/filteredQuestions.length) * 100;
                document.getElementById('result-text').textContent = percentage >= 80 ? "Excellent result!" : percentage >= 50 ? "Good effort, keep practicing." : "Review the topics and try again.";
            }
        };

        startBtn.onclick = () => {
            setupView.classList.add('hidden');
            quizView.classList.remove('hidden');
            showQuestion();
        };

        window.onload = loadQuizData;
    </script>
</body>
</html>
