<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Teachable Machine</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; overscroll-behavior-y: none; }
    
    /* Custom Scrollbar for inner scrolling panels */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Ensure elements with min-h-0 can shrink in flex containers */
    .min-h-0 { min-height: 0; }
  </style>

  <!-- Filter harmless TensorFlow Lite WASM info logs -->
  <script>
    (function() {
      const originalConsoleError = console.error;
      const originalConsoleWarn = console.warn;
      const originalConsoleInfo = console.info;
      const originalConsoleLog = console.log;
      const shouldFilter = (args) => {
        if (args.length > 0 && typeof args[0] === 'string') {
          if (args[0].includes('Created TensorFlow Lite XNNPACK delegate')) return true;
          if (args[0].startsWith('INFO:')) return true; 
        }
        return false;
      };
      console.error = function(...args) { if (!shouldFilter(args)) originalConsoleError.apply(console, args); };
      console.warn = function(...args) { if (!shouldFilter(args)) originalConsoleWarn.apply(console, args); };
      console.info = function(...args) { if (!shouldFilter(args)) originalConsoleInfo.apply(console, args); };
      console.log = function(...args) { if (!shouldFilter(args)) originalConsoleLog.apply(console, args); };
    })();
  </script>
</head>
<body class="bg-[#f3f4f6]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- Inline SVG Icons ---
    const Camera = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const Plus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const Trash2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const XIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;
    const ArrowLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const Play = ({ className, fill }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const Brain = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>;
    const Loader2 = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Upload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const FlipCamera = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>;

    const COLORS = [
      { bg: 'bg-orange-400', border: 'border-orange-400' },
      { bg: 'bg-purple-400', border: 'border-purple-400' },
      { bg: 'bg-emerald-400', border: 'border-emerald-400' },
      { bg: 'bg-blue-400', border: 'border-blue-400' },
      { bg: 'bg-pink-400', border: 'border-pink-400' },
      { bg: 'bg-cyan-400', border: 'border-cyan-400' },
    ];

    function App() {
      const [isModelLoaded, setIsModelLoaded] = useState(false);
      const [isWebcamReady, setIsWebcamReady] = useState(false);
      const [webcamError, setWebcamError] = useState(null);
      const [classes, setClasses] = useState([
        { id: '1', name: 'Class 1', samples: 0, thumbnails: [], ...COLORS[0] },
        { id: '2', name: 'Class 2', samples: 0, thumbnails: [], ...COLORS[1] },
      ]);
      const [activeRecordingId, setActiveRecordingId] = useState(null);
      const [isTraining, setIsTraining] = useState(false);
      const [trainingProgress, setTrainingProgress] = useState(0);
      const [isTrained, setIsTrained] = useState(false);
      const [predictions, setPredictions] = useState([]);
      const [testImageSrc, setTestImageSrc] = useState(null);
      const [facingMode, setFacingMode] = useState('user');

      const webcamRef = useRef(null);
      const imageEmbedderRef = useRef(null);
      const videoEmbedderRef = useRef(null);
      const datasetRef = useRef([]);
      const classesRef = useRef(classes);
      
      const isRecordingRef = useRef(false);
      const recordingClassRef = useRef(null);
      const isLoopingRef = useRef(false);
      const lastCaptureTimeRef = useRef(0);
      
      const isPredictingRef = useRef(false);
      const isPredictLoopingRef = useRef(false);
      const lastPredictTimeRef = useRef(0);
      const isTrainedRef = useRef(false);
      const facingModeRef = useRef(facingMode);
      
      const lastMpTimeRef = useRef(-1);

      useEffect(() => { classesRef.current = classes; }, [classes]);
      useEffect(() => { isTrainedRef.current = isTrained; }, [isTrained]);
      useEffect(() => { facingModeRef.current = facingMode; }, [facingMode]);

      useEffect(() => {
        const initModel = async () => {
          try {
            const loadVision = new Function('return import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs")');
            const vision = await loadVision();
            const resolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
            
            const baseOptions = {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_embedder/mobilenet_v3_small/float32/1/mobilenet_v3_small.tflite"
            };

            imageEmbedderRef.current = await vision.ImageEmbedder.createFromOptions(resolver, { baseOptions, runningMode: "IMAGE" });
            videoEmbedderRef.current = await vision.ImageEmbedder.createFromOptions(resolver, { baseOptions, runningMode: "VIDEO" });
            setIsModelLoaded(true);
          } catch (err) {
            console.error("Model initialization error:", err);
          }
        };
        initModel();
      }, []);

      useEffect(() => {
        const initCamera = async () => {
          try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("Camera API not supported.");
            if (webcamRef.current && webcamRef.current.srcObject) {
              webcamRef.current.srcObject.getTracks().forEach(track => track.stop());
            }

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
            if (webcamRef.current) webcamRef.current.srcObject = stream;
            setWebcamError(null);
          } catch (err) {
            console.warn("Webcam initialization failed.", err);
            setWebcamError(err.message || "Requested device not found");
          }
        };
        initCamera();
        return () => {
          if (webcamRef.current && webcamRef.current.srcObject) webcamRef.current.srcObject.getTracks().forEach(track => track.stop());
        };
      }, [facingMode]);

      const toggleCamera = () => {
        setFacingMode(prev => prev === 'user' ? 'environment' : 'user');
        setIsWebcamReady(false);
      };

      const calculateCosineSimilarity = (vecA, vecB) => {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < vecA.length; i++) { dotProduct += vecA[i] * vecB[i]; normA += vecA[i] * vecA[i]; normB += vecB[i] * vecB[i]; }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
      };

      const runKNN = (currentEmbedding) => {
        const distances = datasetRef.current.map(item => ({
          classId: item.classId, similarity: calculateCosineSimilarity(currentEmbedding, item.embedding)
        }));
        distances.sort((a, b) => b.similarity - a.similarity);
        const topK = distances.slice(0, 15);
        const classWeights = {};
        classesRef.current.forEach(c => classWeights[c.id] = 0);

        if (topK.length > 0) {
          const maxSim = Math.max(...topK.map(t => t.similarity));
          let totalWeight = 0;
          topK.forEach(item => {
            const weight = Math.exp((item.similarity - maxSim) * 10);
            if (classWeights[item.classId] !== undefined) {
              classWeights[item.classId] += weight; totalWeight += weight;
            }
          });
          return classesRef.current.map(c => ({ id: c.id, probability: totalWeight > 0 ? classWeights[c.id] / totalWeight : 0 }));
        }
        return [];
      };
      
      const getStrictMpTime = () => {
        let t = performance.now();
        if (t <= lastMpTimeRef.current) t = lastMpTimeRef.current + 1;
        lastMpTimeRef.current = t;
        return t;
      };

      const predictSingleImage = useCallback((imgElement) => {
        if (imgElement && imageEmbedderRef.current && datasetRef.current.length > 0) {
          try {
            const result = imageEmbedderRef.current.embed(imgElement);
            if (result.embeddings && result.embeddings.length > 0) {
              setPredictions(runKNN(result.embeddings[0].floatEmbedding));
            }
          } catch (e) { console.warn("Prediction on image failed", e); }
        }
      }, []);

      const processUploadedImages = async (e, classId) => {
        const files = Array.from(e.target.files);
        if (!files.length || !imageEmbedderRef.current) return;

        const newThumbs = [];
        for (const file of files) {
          const url = URL.createObjectURL(file);
          const img = new Image();
          await new Promise((res, rej) => {
            img.onload = res; img.onerror = () => rej(new Error("Failed to load image.")); img.src = url;
          }).catch(console.error);
          
          try {
            const result = imageEmbedderRef.current.embed(img);
            if (result.embeddings && result.embeddings.length > 0) {
              const embedding = new Float32Array(result.embeddings[0].floatEmbedding);
              const canvas = document.createElement('canvas');
              canvas.width = 64; canvas.height = 64;
              const ctx = canvas.getContext('2d');
              const minDim = Math.min(img.width, img.height);
              ctx.drawImage(img, (img.width - minDim) / 2, (img.height - minDim) / 2, minDim, minDim, 0, 0, 64, 64);
              const thumb = canvas.toDataURL('image/jpeg', 0.5);
              
              datasetRef.current.push({ classId, embedding });
              newThumbs.push(thumb);
            }
          } catch (err) { console.error("Error processing image:", err); }
        }

        setClasses(prev => prev.map(c => {
          if (c.id === classId) return { ...c, samples: c.samples + newThumbs.length, thumbnails: [...newThumbs, ...c.thumbnails].slice(0, 24) };
          return c;
        }));
      };

      const handleTestImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file || !imageEmbedderRef.current) return;
        const url = URL.createObjectURL(file);
        setTestImageSrc(url);
        const img = new Image();
        img.onload = () => { if (isTrainedRef.current) predictSingleImage(img); };
        img.src = url;
      };

      const predictFrame = useCallback(() => {
        if (!isPredictingRef.current) { isPredictLoopingRef.current = false; return; }
        isPredictLoopingRef.current = true;
        const now = performance.now();
        if (now - lastPredictTimeRef.current > 50) {
          if (webcamRef.current && webcamRef.current.readyState >= 2 && videoEmbedderRef.current) {
            try {
              const mpTime = getStrictMpTime();
              const result = videoEmbedderRef.current.embedForVideo(webcamRef.current, mpTime);
              if (result.embeddings && result.embeddings.length > 0 && datasetRef.current.length > 0) {
                setPredictions(runKNN(result.embeddings[0].floatEmbedding));
              }
            } catch (e) { console.warn("Prediction frame skipped"); }
          }
          lastPredictTimeRef.current = now;
        }
        requestAnimationFrame(predictFrame);
      }, []);

      const captureThumbnail = () => {
        const video = webcamRef.current;
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const minDim = Math.min(video.videoWidth, video.videoHeight);
        if (facingModeRef.current === 'user') { ctx.translate(64, 0); ctx.scale(-1, 1); }
        ctx.drawImage(video, (video.videoWidth - minDim) / 2, (video.videoHeight - minDim) / 2, minDim, minDim, 0, 0, 64, 64);
        return canvas.toDataURL('image/jpeg', 0.5);
      };

      const recordFrame = useCallback(() => {
        if (!isRecordingRef.current) { isLoopingRef.current = false; return; }
        isLoopingRef.current = true;
        const now = performance.now();
        if (now - lastCaptureTimeRef.current > 100) {
          if (webcamRef.current && webcamRef.current.readyState >= 2 && videoEmbedderRef.current) {
            try {
              const mpTime = getStrictMpTime();
              const result = videoEmbedderRef.current.embedForVideo(webcamRef.current, mpTime);
              if (result.embeddings && result.embeddings.length > 0) {
                const embedding = new Float32Array(result.embeddings[0].floatEmbedding);
                const thumb = captureThumbnail();
                datasetRef.current.push({ classId: recordingClassRef.current, embedding });
                setClasses(prev => prev.map(c => c.id === recordingClassRef.current ? { ...c, samples: c.samples + 1, thumbnails: [thumb, ...c.thumbnails].slice(0, 24) } : c));
              }
            } catch (e) { console.error("Frame capture error"); }
          }
          lastCaptureTimeRef.current = now;
        }
        requestAnimationFrame(recordFrame);
      }, []);

      const startRecording = (id) => {
        if (!isModelLoaded || webcamError || !isWebcamReady) return;
        setActiveRecordingId(id);
        isRecordingRef.current = true;
        recordingClassRef.current = id;
        if (!isLoopingRef.current) recordFrame();
      };

      const stopRecording = () => {
        setActiveRecordingId(null);
        isRecordingRef.current = false;
        recordingClassRef.current = null;
      };

      const trainModel = () => {
        setIsTraining(true); setIsTrained(false); isPredictingRef.current = false; setTrainingProgress(0);
        let progress = 0;
        const interval = setInterval(() => {
          progress += 25; setTrainingProgress(progress);
          if (progress >= 100) {
            clearInterval(interval);
            setIsTraining(false); setIsTrained(true); isPredictingRef.current = true;
            if (!webcamError) { if (!isPredictLoopingRef.current) predictFrame(); } 
            else { const imgElement = document.getElementById('test-image-element'); if (imgElement) predictSingleImage(imgElement); }
          }
        }, 250);
      };

      const addClass = () => {
        const newId = Date.now().toString();
        const colorIndex = classes.length % COLORS.length;
        setClasses(prev => [...prev, { id: newId, name: `Class ${classes.length + 1}`, samples: 0, thumbnails: [], ...COLORS[colorIndex] }]);
      };

      const deleteClass = (id) => {
        setClasses(prev => prev.filter(c => c.id !== id));
        datasetRef.current = datasetRef.current.filter(d => d.classId !== id);
        if (classesRef.current.filter(c => c.id !== id && c.samples > 0).length < 2) {
          setIsTrained(false); isPredictingRef.current = false; setPredictions([]);
        }
      };

      const clearSamples = (id) => {
        setClasses(prev => prev.map(c => c.id === id ? { ...c, samples: 0, thumbnails: [] } : c));
        datasetRef.current = datasetRef.current.filter(d => d.classId !== id);
      };

      const canTrain = classes.filter(c => c.samples > 0).length >= 2;

      return (
        <div className="flex flex-col min-h-screen md:h-screen md:overflow-hidden bg-[#f3f4f6] text-gray-900 font-sans">
          
          {/* Global Loading Overlay */}
          {!isModelLoaded && (
            <div className="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
              <Loader2 className="w-12 h-12 animate-spin text-blue-600 mb-4" />
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800">Loading Models</h2>
              <p className="text-gray-500 mt-2 text-sm sm:text-base font-medium">Preparing AI engine...</p>
            </div>
          )}

          {/* HEADER - Fixed height flex-none to reserve top space */}
          <div className="h-14 md:h-16 flex-none bg-white shadow-sm border-b border-gray-200 px-4 md:px-6 flex items-center justify-between sticky top-0 z-40">
            <div className="flex items-center gap-3 w-full">
              <a href="../" className="p-2 -ml-2 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors flex items-center gap-2">
                <ArrowLeft className="w-5 h-5" />
              </a>
              <div className="w-px h-6 bg-gray-200 mx-1"></div>
              <div className="w-8 h-8 rounded-md bg-blue-600 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-inner">TM</div>
              <h1 className="font-bold text-base sm:text-lg tracking-tight text-gray-800 truncate">Teachable Machine Clone</h1>
              <div className="ml-auto hidden sm:block text-[11px] sm:text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 uppercase tracking-wide">
                Image Classification
              </div>
            </div>
          </div>

          {/* MAIN WORKSPACE - Responsive Grid Layout */}
          <div className="flex-1 w-full max-w-[1600px] mx-auto flex flex-col md:min-h-0">
            
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 md:grid-rows-[auto_auto_minmax(0,1fr)] lg:grid-rows-[auto_minmax(0,1fr)] gap-5 md:gap-6 flex-1 md:min-h-0 px-4 py-4 md:p-6 pb-12 md:pb-6">
              
              {/* 1. CAMERA PREVIEW (Sticky top on mobile, Top Right on Tablet/Desktop) */}
              <div className="order-1 md:order-none md:col-start-2 md:row-start-1 lg:col-start-8 lg:col-span-5 lg:row-start-1 sticky top-[56px] z-30 bg-[#f3f4f6] md:bg-transparent -mx-4 px-4 pb-2 md:mx-0 md:px-0 md:pb-0 border-b md:border-b-0 border-gray-200/50 md:min-h-0 shadow-sm md:shadow-none">
                <div className="bg-white rounded-2xl md:shadow-sm md:border border-gray-100 p-2 md:p-4 w-full">
                  <div className="relative w-full aspect-video md:aspect-[4/3] max-h-[35vh] md:max-h-[50vh] lg:max-h-none bg-gray-900 rounded-xl overflow-hidden shadow-inner flex items-center justify-center group">
                    {!webcamError && (
                      <>
                        <video 
                          ref={webcamRef} onLoadedData={() => setIsWebcamReady(true)}
                          className={`w-full h-full object-cover transform transition-opacity duration-300 ${facingMode === 'user' ? '-scale-x-100' : ''} ${isWebcamReady ? 'opacity-100' : 'opacity-0'}`}
                          autoPlay muted playsInline 
                        />
                        <button 
                          onClick={toggleCamera}
                          className="absolute top-3 right-3 bg-black/50 hover:bg-black/70 text-white p-2 sm:p-2.5 rounded-full backdrop-blur-md transition-all shadow-lg z-20 focus:outline-none"
                          title="Flip Camera"
                        >
                          <FlipCamera className="w-4 h-4 sm:w-5 sm:h-5" />
                        </button>
                      </>
                    )}
                    
                    {webcamError ? (
                      <div className="absolute inset-0 flex flex-col items-center justify-center p-4 text-center bg-gray-900 z-10">
                        {testImageSrc ? (
                          <img src={testImageSrc} className="w-full h-full object-cover absolute inset-0 z-0" id="test-image-element" alt="Test" />
                        ) : (
                          <div className="text-gray-400 flex flex-col items-center gap-2 z-10">
                            <Upload className="w-8 h-8 opacity-60" />
                            <p className="font-bold text-sm">No Camera</p>
                          </div>
                        )}
                        <label className="absolute bottom-3 z-20 px-3 py-1.5 bg-blue-600/90 hover:bg-blue-500 text-white rounded-lg cursor-pointer text-xs font-semibold shadow-lg backdrop-blur-sm border border-blue-400/30">
                          {testImageSrc ? 'Change' : 'Upload Test Image'}
                          <input type="file" accept="image/*" className="hidden" onClick={(e) => e.target.value = null} onChange={handleTestImageUpload} />
                        </label>
                      </div>
                    ) : !isWebcamReady && (
                      <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 text-sm gap-2">
                        <Loader2 className="w-6 h-6 animate-spin opacity-50" />
                        Waiting...
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* 2. CLASSES LIST (Scrolls natively on Mobile, scrolls internally on Tablet/Desktop) */}
              <div className="order-2 md:order-none md:col-start-1 md:row-start-1 md:row-span-3 lg:col-start-1 lg:col-span-5 lg:row-span-2 md:overflow-y-auto custom-scrollbar flex flex-col gap-5 md:gap-6 md:pr-2 md:min-h-0 md:pb-8">
                {classes.map(c => (
                  <div key={c.id} className={`bg-white rounded-2xl shadow-sm border-t-8 border-x border-b border-gray-100 overflow-hidden flex flex-col ${c.border}`}>
                    <div className="p-3 lg:p-4 border-b border-gray-50 flex justify-between items-center">
                      <input
                        type="text"
                        value={c.name}
                        onChange={(e) => setClasses(prev => prev.map(cls => cls.id === c.id ? { ...cls, name: e.target.value } : cls))}
                        className="font-bold text-base lg:text-lg bg-transparent border-none outline-none focus:ring-0 text-gray-800 placeholder-gray-300 min-w-0 flex-1 truncate mr-2"
                      />
                      <div className="flex items-center gap-1 shrink-0">
                        {c.samples > 0 && (
                          <button onClick={() => clearSamples(c.id)} className="p-2 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-lg transition-colors" title="Clear samples">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        )}
                        {classes.length > 1 && (
                          <button onClick={() => deleteClass(c.id)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete class">
                            <XIcon className="w-5 h-5" />
                          </button>
                        )}
                      </div>
                    </div>

                    <div className="p-4 lg:p-5 flex flex-col sm:flex-row gap-4">
                      {/* Record Area */}
                      <div className="w-full sm:w-[35%] flex flex-col items-center justify-center shrink-0">
                        {webcamError ? (
                          <label className={`w-full h-20 sm:h-full py-3 rounded-xl flex flex-col items-center justify-center gap-1.5 text-white font-medium cursor-pointer transition-all hover:brightness-105 shadow-md hover:shadow-lg ${c.bg}`}>
                            <Upload className="w-5 h-5" />
                            <span className="text-xs px-2 text-center">Upload Images</span>
                            <input type="file" multiple accept="image/*" className="hidden" onClick={(e) => e.target.value = null} onChange={(e) => processUploadedImages(e, c.id)} />
                          </label>
                        ) : (
                          <button
                            onPointerDown={(e) => { e.preventDefault(); startRecording(c.id); }}
                            onPointerUp={(e) => { e.preventDefault(); stopRecording(); }}
                            onPointerLeave={(e) => { e.preventDefault(); stopRecording(); }}
                            onContextMenu={(e) => e.preventDefault()}
                            style={{ touchAction: 'none', WebkitUserSelect: 'none', WebkitTouchCallout: 'none' }}
                            disabled={!isModelLoaded || !isWebcamReady}
                            className={`w-full h-24 sm:h-full py-4 rounded-xl flex flex-col items-center justify-center gap-1.5 text-white font-medium transition-all outline-none
                              ${activeRecordingId === c.id ? 'scale-[0.97] brightness-90 shadow-inner' : 'hover:brightness-105 shadow-md active:scale-95'} 
                              ${c.bg} disabled:opacity-50 disabled:cursor-not-allowed`}
                          >
                            {activeRecordingId === c.id ? <Loader2 className="w-5 h-5 sm:w-6 sm:h-6 animate-spin" /> : <Camera className="w-5 h-5 sm:w-6 sm:h-6" />}
                            <span className="text-[11px] sm:text-xs px-1 text-center font-bold">Hold to Record</span>
                          </button>
                        )}
                      </div>
                      
                      {/* Samples Area */}
                      <div className="w-full sm:w-[65%] border border-gray-100 rounded-xl bg-gray-50 p-3 min-h-[85px] sm:min-h-[100px] flex flex-col shrink-0">
                        <div className="text-[10px] sm:text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wide">
                          {c.samples} Samples
                        </div>
                        {c.samples > 0 ? (
                          <div className="flex flex-wrap gap-1 mt-auto">
                            {c.thumbnails.map((t, i) => (
                              <img key={i} src={t} alt="sample" className="w-7 h-7 sm:w-8 sm:h-8 object-cover rounded shadow-sm opacity-90" />
                            ))}
                            {c.samples > 24 && (
                              <div className="w-7 h-7 sm:w-8 sm:h-8 rounded bg-white border border-gray-200 flex items-center justify-center text-[9px] sm:text-[10px] text-gray-500 font-bold">
                                +{c.samples - 24}
                              </div>
                            )}
                          </div>
                        ) : (
                          <div className="flex-1 flex items-center justify-center text-xs text-gray-400 italic">
                            No images yet
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}

                <button
                  onClick={addClass}
                  className="w-full py-4 rounded-2xl border-2 border-dashed border-gray-300 bg-white/50 text-gray-500 font-bold hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50 transition-colors flex items-center justify-center gap-2 shadow-sm"
                >
                  <Plus className="w-5 h-5" />
                  Add a Class
                </button>
              </div>

              {/* 3. TRAINING BUTTON (Middle Right on Tablet, Center on Desktop) */}
              <div className="order-3 md:order-none md:col-start-2 md:row-start-2 lg:col-start-6 lg:col-span-2 lg:row-start-1 lg:row-span-2 flex flex-col justify-center w-full">
                <div className="bg-white p-5 lg:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center w-full">
                  <h3 className="font-bold text-gray-800 mb-3 lg:mb-4 text-base lg:text-lg">Training</h3>
                  <button
                    onClick={trainModel}
                    disabled={!canTrain || isTraining}
                    className={`w-full py-3.5 lg:py-4 rounded-xl font-bold text-sm lg:text-base transition-all flex flex-col items-center justify-center gap-2 border-b-4 active:border-b-0 active:translate-y-[4px]
                      ${!canTrain ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'
                      : isTraining ? 'bg-blue-50 text-blue-600 border-blue-200'
                      : 'bg-blue-600 text-white border-blue-800 hover:bg-blue-500'}`}
                  >
                    {isTraining ? (
                      <><Loader2 className="w-5 h-5 animate-spin" /> Training...</>
                    ) : isTrained ? (
                      <><Brain className="w-5 h-5" /> Train Again</>
                    ) : (
                      <><Play className="w-5 h-5" fill="currentColor" /> Train Model</>
                    )}
                  </button>
                  
                  {isTraining && (
                    <div className="w-full bg-gray-100 rounded-full h-2 mt-4 overflow-hidden">
                      <div className="bg-blue-600 h-2 rounded-full transition-all duration-200" style={{ width: `${trainingProgress}%` }}></div>
                    </div>
                  )}

                  {!canTrain && (
                    <p className="text-[11px] lg:text-xs text-center text-gray-400 mt-4 leading-relaxed font-semibold">
                      Add samples to at least 2 classes.
                    </p>
                  )}
                </div>
              </div>

              {/* 4. PREDICTIONS OUTPUT (Bottom Right) */}
              <div className="order-4 md:order-none md:col-start-2 md:row-start-3 lg:col-start-8 lg:col-span-5 lg:row-start-2 md:overflow-y-auto custom-scrollbar md:pr-2 md:min-h-0 md:pb-8">
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 lg:p-5 w-full">
                  <h4 className="text-[11px] lg:text-xs font-bold text-gray-400 mb-4 uppercase tracking-wider">Live Output</h4>
                  {isTrained ? (
                    <div className="space-y-4">
                      {classes.map(c => {
                        const pred = predictions.find(p => p.id === c.id);
                        const prob = pred ? pred.probability : 0;
                        const percentage = Math.round(prob * 100);
                        return (
                          <div key={c.id} className="relative">
                            <div className="flex justify-between text-sm font-bold text-gray-700 mb-1.5">
                              <span className="truncate pr-4">{c.name}</span>
                              <span className="tabular-nums shrink-0">{percentage}%</span>
                            </div>
                            <div className="w-full bg-gray-100 rounded-full h-3 lg:h-4 overflow-hidden shadow-inner relative">
                              <div
                                className={`absolute left-0 top-0 h-full transition-all duration-150 ease-out ${c.bg}`}
                                style={{ width: `${percentage}%` }}
                              ></div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <div className="text-center text-gray-400 text-sm py-8 border-2 border-dashed border-gray-100 rounded-xl bg-gray-50 font-medium">
                      Train the model to see live predictions.
                    </div>
                  )}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
